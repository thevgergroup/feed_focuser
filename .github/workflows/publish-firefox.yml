name: Publish to Firefox AMO

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.7)'
        required: true

jobs:
  publish-firefox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ github.event.inputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build artifacts
        run: npm run build

      - name: Submit to Firefox AMO (listed)
        uses: browser-actions/release-firefox-addon@v0.2.1
        with:
          addon-id: feedfocuser@thevgergroup.com
          addon-path: dist/feed-focuser-firefox.xpi
          auth-api-issuer: ${{ secrets.MOZILLA_JWT_ISSUER }}
          auth-api-secret: ${{ secrets.MOZILLA_JWT_SECRET }}
          channel: listed
          release-note: "v${{ github.event.inputs.version }} — see https://github.com/thevgergroup/feed_focuser/releases/tag/v${{ github.event.inputs.version }} for full changelog."
