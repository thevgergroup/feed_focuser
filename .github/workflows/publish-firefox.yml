name: Publish to Firefox AMO

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.8)'
        required: true

jobs:
  publish-firefox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ github.event.inputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build artifacts
        run: npm run build

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Submit to Firefox AMO via web-ext
        env:
          WEB_EXT_API_KEY: ${{ secrets.MOZILLA_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.MOZILLA_JWT_SECRET }}
        run: |
          web-ext sign \
            --source-dir extension/ \
            --api-key "$WEB_EXT_API_KEY" \
            --api-secret "$WEB_EXT_API_SECRET" \
            --channel listed \
            --no-input \
            --timeout 0 \
            --amo-metadata '{"version":{"release_notes":{"en-US":"v${{ github.event.inputs.version }} — see release notes at https://github.com/thevgergroup/feed_focuser/releases/tag/v${{ github.event.inputs.version }}"}}}'
