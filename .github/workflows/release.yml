name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Extract version from manifest
        id: version
        run: echo "version=$(node -p "require('./extension/manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "Tag $TAG does not match manifest version $MANIFEST"
            exit 1
          fi

      - name: Build artifacts
        run: npm run build

      - name: Sign Firefox XPI (unlisted) for immediate distribution
        env:
          MOZILLA_JWT_ISSUER: ${{ secrets.MOZILLA_JWT_ISSUER }}
          MOZILLA_JWT_SECRET: ${{ secrets.MOZILLA_JWT_SECRET }}
        run: |
          npx web-ext sign \
            --source-dir extension/ \
            --artifacts-dir dist/ \
            --api-key "$MOZILLA_JWT_ISSUER" \
            --api-secret "$MOZILLA_JWT_SECRET" \
            --channel unlisted || \
          echo "::warning::Firefox signing failed. Skipping."
          XPI=$(find dist -name '*.xpi' ! -name 'feed-focuser-firefox.xpi' | head -1)
          [ -n "$XPI" ] && mv "$XPI" dist/feed-focuser-firefox.xpi || true

      - name: Submit Firefox XPI to AMO listed (fire and forget)
        env:
          MOZILLA_JWT_ISSUER: ${{ secrets.MOZILLA_JWT_ISSUER }}
          MOZILLA_JWT_SECRET: ${{ secrets.MOZILLA_JWT_SECRET }}
        run: |
          python3 << 'PYEOF'
          import os, time, json, hmac, hashlib, base64, uuid, urllib.request, urllib.error

          issuer = os.environ['MOZILLA_JWT_ISSUER']
          secret = os.environ['MOZILLA_JWT_SECRET']
          addon_id = 'feedfocuser@thevgergroup.com'

          header  = base64.urlsafe_b64encode(json.dumps({"alg":"HS256","typ":"JWT"}).encode()).rstrip(b'=').decode()
          payload = base64.urlsafe_b64encode(json.dumps({
            "iss": issuer, "jti": str(uuid.uuid4()),
            "iat": int(time.time()), "exp": int(time.time()) + 300
          }).encode()).rstrip(b'=').decode()
          msg = f"{header}.{payload}"
          sig = base64.urlsafe_b64encode(
            hmac.new(secret.encode(), msg.encode(), hashlib.sha256).digest()
          ).rstrip(b'=').decode()
          token = f"{msg}.{sig}"

          xpi_path = 'dist/feed-focuser-firefox.xpi'
          with open(xpi_path, 'rb') as f:
            xpi_data = f.read()

          boundary = uuid.uuid4().hex
          body = (
            f'--{boundary}\r\nContent-Disposition: form-data; name="upload"; filename="feed-focuser-firefox.xpi"\r\n'
            f'Content-Type: application/x-xpinstall\r\n\r\n'
          ).encode() + xpi_data + f'\r\n--{boundary}--\r\n'.encode()

          req = urllib.request.Request(
            f'https://addons.mozilla.org/api/v5/addons/{addon_id}/versions/',
            data=body,
            headers={"Authorization": f"JWT {token}", 'Content-Type': f'multipart/form-data; boundary={boundary}'},
            method='POST'
          )
          try:
            resp = json.loads(urllib.request.urlopen(req).read())
            print(f"Submitted to AMO listed: version {resp.get('version')}, status={resp.get('file',{}).get('status','unknown')}")
          except urllib.error.HTTPError as e:
            err = e.read().decode()
            if 'already exists' in err or e.code == 409:
              print("::warning::Version already exists on AMO listed, skipping.")
            else:
              print(f"::warning::AMO listed submission failed ({e.code}): {err}")
          PYEOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: feed-focuser-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: feed-focuser-${{ needs.build.outputs.version }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/feed-focuser-chrome.zip
            dist/feed-focuser-firefox.xpi
          generate_release_notes: true
